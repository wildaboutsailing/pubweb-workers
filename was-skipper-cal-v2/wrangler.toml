# pubweb-workers/was-skipper-cal-v2/wrangler.toml
# ---------------------------------------------------------------------------
# `name` MUST be exactly "was-skipper-cal-v2" so a build deploys to THIS
# existing Worker, not a new one and not a similarly-named neighbor
# (was-skipper-cal, was-skipper-datelist are separate, already-unused
# Workers — double-check the name).
#
# This folder must be its OWN subfolder in the repo, e.g.
# pubweb-workers/was-skipper-cal-v2/, containing this file plus
# was-skipper-cal-v2.js. When you connect the Cloudflare build, Root
# Directory must point at this exact subfolder — clear the field and
# retype it rather than trust what's shown, since was-lts-cal-v3 just
# had a build fail with "root directory not found" from what looked like
# a stray invisible character in that field. Build watch paths must be
# narrowed to was-skipper-cal-v2/* IMMEDIATELY on connecting.
name = "was-skipper-cal-v2"
main = "was-skipper-cal-v2.js"

# CHECK THIS before first deploy: verify against the live Worker's actual
# compatibility date rather than trusting this default.
compatibility_date = "2026-06-17"  # <-- VERIFY against the live Worker

# No [[kv_namespaces]] — same pattern as the other calendar widgets: live
# data comes from was-cal-engine and corzisio-worker-learn-datesandspots via
# fetch() calls made inside the served widget JS, not from anything this
# Worker stores itself.

# No [triggers] — this Worker only serves GET requests for the calendar
# widget script.

# Keep console.log visible for debugging.
[observability]
enabled = true

# No [vars] block — no secrets or environment-specific config of its own.

# NOTE: was-skipper-cal-v2.js already includes two fixes applied and
# verified before this migration (not after, unlike the camp-cal /
# lts-cal-v3 near-misses):
#   1. document.head || document.documentElement fallback (same bug as
#      was-lts-camp-cal and was-lts-cal-v3 had).
#   2. match() no longer requires the literal "!" in "learn to skipper!" --
#      was the tightest, most brittle course-name match of any calendar
#      worker reviewed tonight; loosened to reduce breakage risk if the
#      Corsizio course title ever changes.
#
# NOTE: this config has no buttonLayout / buttonTheme keys — worth
# standardizing across all calendar workers once every migration is done.




