name = "was-request-form"
main = "was-request-form-worker.js"
compatibility_date = "2025-07-01"

# Single self-contained file, no imports — skip bundling so the deployed
# output stays byte-identical to source (keeps the header banner, no \u
# escapes, no sourcemap). If you ever add imports, delete this [build] block
# and let wrangler bundle normally.
[build]
command = ""

# No routes/custom domain needed — the worker keeps its
# was-request-form.dave-6bf.workers.dev URL, which the calendar engine
# references directly. Add a [[routes]] block only if you later put it
# on a custom domain.