# pubweb-workers/was-artie/wrangler.toml
# ----------------------------------------------------------------------------
# `name` MUST be exactly "was-artie" so the build deploys to your EXISTING
# Worker (and keeps its secrets), instead of spawning a new one.
name = "was-artie"
main = "was-artie.js"
compatibility_date = "2026-06-17"   # match was-dash-cal so the deploy stops warning

# Rate-limiting, the knowledge/schedule cache, AND the daily-digest log all live
# in KV. This binding MUST be declared here — without it the build deploys Artie
# with no KV and rate-limiting, caching, and the digest all break.
[[kv_namespaces]]
binding = "RATE_KV"
id = "7d95f41c51aa4e72a865d6f7195a92ad"

# Daily digest. 15:00 UTC = ~8am Pacific (PDT) / 7am (PST). Change the hour to
# retime it; it's UTC, so it drifts one hour across daylight saving.
[triggers]
crons = ["0 15 * * *"]

# Keep Artie's console.log visible for debugging.
[observability]
enabled = true

# No [vars] block on purpose — every env value (the original four secrets, the
# four promoted ones, plus DIGEST_MAILER_URL) is an encrypted Secret in the
# dashboard. Secrets survive deploys and never touch the repo.


