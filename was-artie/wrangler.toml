# pubweb-workers/was-artie/wrangler.toml
# ----------------------------------------------------------------------------
# `name` MUST be exactly "was-artie" so the build deploys to your EXISTING
# Worker (and keeps its secrets), instead of spawning a new one.
name = "was-artie"
main = "was-artie.js"
compatibility_date = "2024-01-01"   # match was-dash-cal's value if you want them identical

# Rate-limiting + the knowledge/schedule cache live in KV. This binding MUST be
# declared here — if it's missing, the GitHub build deploys Artie WITHOUT it and
# rate-limiting and the 5-min schedule cache both break (and getSchedule throws).
# `binding` must equal what the code reads (env.RATE_KV); `id` is the ARTIE_RATE
# namespace ID (an identifier, not a secret — safe to commit).
[[kv_namespaces]]
binding = "RATE_KV"
id = "7d95f41c51aa4e72a865d6f7195a92ad"

# Deliberately NO [vars] block. Everything Artie reads from env — the four
# secrets it already had (ANTHROPIC_API_KEY, CORSIZIO_API_KEY, QUO_API_KEY,
# SHARED_SECRET) plus the four promoted ones (APPS_SCRIPT_URL, KNOWLEDGE_URL,
# QUO_FROM, TEAM_NUMBERS) — is an encrypted Secret set in the dashboard.
# Secrets survive deploys and never touch the repo. That's what keeps this public.
